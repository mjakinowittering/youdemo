# Workflow for building and deploying YouDemo (SvelteKit) to GitHub Pages
name: Deploy YouDemo to Pages

on:
    push:
        branches: ['master']

    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# Allow only one concurrent deployment; do not cancel in-progress runs.
concurrency:
    group: 'pages'
    cancel-in-progress: false

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
            - name: Setup Pages
              id: pages
              uses: actions/configure-pages@v5
            - name: Cache npm dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-npm-
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright browser
              # Vitest's client + storybook projects run in a real Chromium.
              run: npx playwright install --with-deps chromium  
            - name: Type check
              run: npm run check
            - name: Unit tests
              run: npm run test
            - name: Build
              run: npm run build
              env:
                  BASE_PATH: ${{ steps.pages.outputs.base_path }}
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: build

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        needs: build
        runs-on: ubuntu-latest
        name: Deploy
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
