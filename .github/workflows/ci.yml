# Lint, type-check and unit-test on every PR and branch push (not master —
# that path runs through build-and-deploy.yml before shipping to Pages).
name: CI

on:
    pull_request:
    push:
        branches-ignore: ['master']

jobs:
    check:
        name: Lint · Check · Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
            - name: Cache npm dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-npm-
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright browser
              # Vitest's client + storybook projects run in a real Chromium.
              run: npx playwright install --with-deps chromium
            - name: Lint
              run: npm run lint
            - name: Type check
              run: npm run check
            - name: Unit tests
              run: npm run test
