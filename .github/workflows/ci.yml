# Lint, type-check and unit-test on every PR and branch push (not master —
# that path runs through build-and-deploy.yml before shipping to Pages).
name: CI

on:
    pull_request:
    push:
        branches-ignore: ['master']

# A push to a branch with an open PR fires both `push` and `pull_request`.
# For the PR event `head_ref` is the source branch; for the push event it is
# empty and `ref_name` is that same branch — so both share one group and
# `cancel-in-progress` collapses them into a single run. Branches pushed
# without a PR keep their own group and still run.
concurrency:
    group: ci-${{ github.head_ref || github.ref_name }}
    cancel-in-progress: true

jobs:
    check:
        name: Lint · Check · Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'
            - name: Cache npm dependencies
              uses: actions/cache@v6
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-npm-
            - name: Install dependencies
              run: npm ci
            - name: Cache Playwright browsers
              uses: actions/cache@v6
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
            - name: Install Playwright browser
              # Vitest's client + storybook projects run in a real Chromium.
              # No --with-deps: the runner image already ships every library
              # Chromium needs, and apt stalls fetching the optional CJK fonts.
              run: npx playwright install chromium
              timeout-minutes: 5
            - name: Lint
              run: npm run lint
            - name: Type check
              run: npm run check
            - name: Unit tests
              run: npm run test
